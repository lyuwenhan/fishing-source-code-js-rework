name: Build Electron

on:
  push:
    branches:
      - main
    paths-ignore:
      - electron/main.js
      - docs/main.js
      - electron/icons/icon.ico
      - electron/icons/icon.icns
      - data/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle main.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle to root main.js
        run: npm run bundle

      - name: Commit root main.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f main.js
          if git diff --cached --quiet; then
            echo "No root main.js changes"
          else
            git commit -m "build: update root main.js [skip ci]"
            git pull --rebase origin main
            git push
          fi

  copy-bundle:
    name: Copy main.js to electron and docs
    runs-on: ubuntu-latest
    needs: bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - name: Copy main.js
        run: |
          mkdir -p electron
          mkdir -p docs
          cp main.js electron/main.js
          cp main.js docs/main.js

      - name: Commit copied main.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f electron/main.js docs/main.js
          if git diff --cached --quiet; then
            echo "No copied main.js changes"
          else
            git commit -m "build: copy main.js to electron and docs [skip ci]"
            git pull --rebase origin main
            git push
          fi

  icon-ico:
    name: Generate icon.ico
    runs-on: ubuntu-latest
    needs: copy-bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate icon.ico
        run: convert electron/icons/16x16.png electron/icons/24x24.png electron/icons/32x32.png electron/icons/48x48.png electron/icons/64x64.png electron/icons/128x128.png electron/icons/256x256.png electron/icons/icon.ico

      - name: Commit icon.ico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f electron/icons/icon.ico
          if git diff --cached --quiet; then
            echo "No icon.ico changes"
          else
            git commit -m "build: update icon.ico [skip ci]"
            git pull --rebase origin main
            git push
          fi

  icon-icns:
    name: Generate icon.icns
    runs-on: macos-latest
    needs: icon-ico

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin main

      - name: Generate icon.icns
        run: |
          mkdir -p electron/icons/icon.iconset
          cp electron/icons/16x16.png electron/icons/icon.iconset/icon_16x16.png
          cp electron/icons/32x32.png electron/icons/icon.iconset/icon_16x16@2x.png
          cp electron/icons/32x32.png electron/icons/icon.iconset/icon_32x32.png
          cp electron/icons/64x64.png electron/icons/icon.iconset/icon_32x32@2x.png
          cp electron/icons/128x128.png electron/icons/icon.iconset/icon_128x128.png
          cp electron/icons/256x256.png electron/icons/icon.iconset/icon_128x128@2x.png
          cp electron/icons/256x256.png electron/icons/icon.iconset/icon_256x256.png
          cp electron/icons/512x512.png electron/icons/icon.iconset/icon_256x256@2x.png
          cp electron/icons/512x512.png electron/icons/icon.iconset/icon_512x512.png
          cp electron/icons/1024x1024.png electron/icons/icon.iconset/icon_512x512@2x.png
          iconutil -c icns electron/icons/icon.iconset -o electron/icons/icon.icns
          rm -rf electron/icons/icon.iconset

      - name: Commit icon.icns
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f electron/icons/icon.icns
          if git diff --cached --quiet; then
            echo "No icon.icns changes"
          else
            git commit -m "build: update icon.icns [skip ci]"
            git pull --rebase origin main
            git push
          fi

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: icon-icns

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            command: npx electron-builder --win --publish never
            copy: cp -f dist/*.exe data/windows/ || true
          - os: ubuntu-latest
            platform: linux
            command: npx electron-builder --linux --publish never
            copy: cp -f dist/*.AppImage dist/*.deb data/linux/ || true
          - os: macos-latest
            platform: macos
            command: npx electron-builder --mac --publish never
            copy: cp -f dist/*.dmg dist/*.zip data/macos/ || true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        shell: bash
        run: git pull origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.command }}

      - name: Copy build outputs to data
        shell: bash
        run: |
          mkdir -p data/${{ matrix.platform }}
          ${{ matrix.copy }}

      - name: Commit build outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/${{ matrix.platform }}
          if git diff --cached --quiet; then
            echo "No ${{ matrix.platform }} build output changes"
          else
            git commit -m "build: update ${{ matrix.platform }} app [skip ci]"
            git pull --rebase origin main
            git push
          fi