name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read status.json
        id: check
        run: node scripts/ci-read-gate.mjs

  build:
    runs-on: ubuntu-latest
    needs: [gate]
    if: needs.gate.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle and minify source-code (entry main.js)
        run: npm run bundle

      - name: Upload main.js for release
        uses: actions/upload-artifact@v4
        with:
          name: fishing-main-js
          path: main.js

      - name: Commit and push bundle
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.js docs/main.js electron/main.js
          if git diff --staged --quiet; then
            echo "Bundle unchanged, nothing to commit."
          else
            git commit -m "chore: build main.js"
            git push
          fi

  icon-ico:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest on branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Setup ImageMagick
        uses: mfinelli/setup-imagemagick@v7
        with:
          cache: true
          install-libfuse2: true

      - name: Build icon.ico from PNGs
        run: |
          set -euo pipefail
          cd electron/icons
          magick 16x16.png 24x24.png 32x32.png 48x48.png 64x64.png 128x128.png 256x256.png 512x512.png 1024x1024.png icon.ico

      - name: Commit and push icon.ico
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/icons/icon.ico
          if git diff --staged --quiet; then
            echo "icon.ico unchanged, nothing to commit."
          else
            git commit -m "chore: regenerate icon.ico"
            git push
          fi

  icon-icns:
    runs-on: macos-latest
    needs: [icon-ico]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest on branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Build icon.icns from PNGs
        run: |
          set -euo pipefail
          cd electron/icons
          rm -rf icon.iconset
          mkdir icon.iconset
          cp 16x16.png icon.iconset/icon_16x16.png
          cp 32x32.png icon.iconset/icon_16x16@2x.png
          cp 32x32.png icon.iconset/icon_32x32.png
          cp 64x64.png icon.iconset/icon_32x32@2x.png
          cp 128x128.png icon.iconset/icon_128x128.png
          cp 256x256.png icon.iconset/icon_128x128@2x.png
          cp 256x256.png icon.iconset/icon_256x256.png
          cp 512x512.png icon.iconset/icon_256x256@2x.png
          cp 512x512.png icon.iconset/icon_512x512.png
          cp 1024x1024.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Commit and push icon.icns
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/icons/icon.icns
          if git diff --staged --quiet; then
            echo "icon.icns unchanged, nothing to commit."
          else
            git commit -m "chore: regenerate icon.icns"
            git push
          fi

  electron-pack:
    needs: [icon-icns]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest on branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y binutils fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Bundle app and pack with electron-builder
        run: npm run dist

      - name: Upload Windows NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: fishing-electron-${{ matrix.os }}-nsis
          path: dist-electron/*Setup*.exe

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: fishing-electron-${{ matrix.os }}-portable
          path: dist-electron/*Portable*.exe

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: fishing-electron-${{ matrix.os }}-dmg
          path: dist-electron/*.dmg

      - name: Upload macOS ZIP
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: fishing-electron-${{ matrix.os }}-zip
          path: dist-electron/*.zip

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: fishing-electron-${{ matrix.os }}-appimage
          path: dist-electron/*.AppImage

      - name: Upload Linux deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: fishing-electron-${{ matrix.os }}-deb
          path: dist-electron/*.deb

  release:
    runs-on: ubuntu-latest
    needs: [gate, build, icon-ico, icon-icns, electron-pack]
    if: needs.gate.outputs.should_release == 'true' && needs.build.result == 'success' && needs.icon-ico.result == 'success' && needs.icon-icns.result == 'success' && needs.electron-pack.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package version
        id: ver
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fishing-*
          path: artifacts
          merge-multiple: false

      - name: Stage release files with fishing-<system>-<type> names
        run: |
          set -euo pipefail
          mkdir -p release-out
          ROOT="artifacts"
          cp "$ROOT/fishing-main-js/main.js" release-out/fishing-main.js
          WIN_NSIS=$(find "$ROOT/fishing-electron-windows-latest-nsis" -maxdepth 1 -type f -name '*.exe' | head -1)
          WIN_PORT=$(find "$ROOT/fishing-electron-windows-latest-portable" -maxdepth 1 -type f -name '*.exe' | head -1)
          MAC_DMG=$(find "$ROOT/fishing-electron-macos-latest-dmg" -maxdepth 1 -type f -name '*.dmg' | head -1)
          MAC_ZIP=$(find "$ROOT/fishing-electron-macos-latest-zip" -maxdepth 1 -type f -name '*.zip' | head -1)
          LIN_AI=$(find "$ROOT/fishing-electron-ubuntu-latest-appimage" -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.appimage' \) | head -1)
          LIN_DEB=$(find "$ROOT/fishing-electron-ubuntu-latest-deb" -maxdepth 1 -type f -name '*.deb' | head -1)
          for pair in "$WIN_NSIS:fishing-windows-install.exe" "$WIN_PORT:fishing-windows-portable.exe" "$MAC_DMG:fishing-macos-install.dmg" "$MAC_ZIP:fishing-macos-portable.zip" "$LIN_AI:fishing-linux-portable.AppImage" "$LIN_DEB:fishing-linux-install.deb"; do
            SRC="${pair%%:*}"
            DST="${pair##*:}"
            if [ -z "$SRC" ] || [ ! -f "$SRC" ]; then
              echo "Missing artifact for $DST (src empty or not a file)" >&2
              exit 1
            fi
            cp "$SRC" "release-out/$DST"
          done
          ls -la release-out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Fishing v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          overwrite_files: true
          files: release-out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  reset-status:
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest on branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Reset status.json
        run: node scripts/ci-reset-status.mjs

      - name: Commit and push status.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          if git diff --staged --quiet; then
            echo "status.json unchanged, nothing to commit."
            exit 0
          fi
          git commit -m "chore: reset needsUpdate in status.json"
          git push
