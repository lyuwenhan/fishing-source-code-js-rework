<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Fishing</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
		<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/uuid@9.0.1/dist/umd/uuid.min.js"></script>
		<style>
			body {
				font-family: Consolas, Courier, monospace;
				padding: 0
			}

			[hidden] {
				display: none !important
			}

			br,
			button,
			img {
				user-select: none;
				-webkit-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
				-webkit-user-drag: none
			}

			body,
			html {
				color: #fff;
				font-size: large;
				overflow: hidden
			}

			#terminal,
			body,
			html {
				background-color: #4e0e3b;
				height: 100%;
				margin: 0;
				padding: 0
			}

			#terminal {
				border: 0;
				bottom: 0;
				left: 0;
				position: fixed;
				right: 0;
				top: 0;
				width: 100%;
				z-index: 1
			}

			html body,
			html body * {
				cursor: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzIiBoZWlnaHQ9IjMiPjxwYXRoIGZpbGw9IiNmZmYiIGQ9Ik0wIDBoM3YzSDB6Ii8+PC9zdmc+") 1 1, auto !important
			}

			#terminal .xterm-viewport::-webkit-scrollbar {
				display: none
			}

			#terminal .xterm-viewport {
				scrollbar-width: none;
				-ms-overflow-style: none
			}

			#onfull {
				display: inline;
				height: 100%;
				width: 100%
			}

			:fullscreen #onfull {
				display: none
			}

			#onufull {
				display: none;
				height: 100%;
				width: 100%
			}

			:fullscreen #onufull {
				display: inline
			}

			#full {
				border: 0;
				border-radius: 10px;
				bottom: 0;
				display: block;
				height: 40px;
				margin: 10px;
				opacity: .7;
				overflow: hidden;
				position: fixed;
				right: 0;
				z-index: 2
			}

			#full:hover {
				opacity: .9
			}

			#full:active {
				opacity: .8
			}

			[hidden],
			[hidden] * {
				display: none !important;
				display: block;
				height: 0 !important;
				opacity: 0 !important;
				pointer-events: none !important;
				visibility: hidden !important;
				width: 0 !important
			}

			[dir=ltr] {
				padding: 10px
			}

		</style>
		<link rel="icon" href="data:,">
	</head>

	<body>
		<div id="terminal">
			<div id="full"><svg id="onfull" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 13 13">
					<path fill="grey" d="M 0 0 L 0 13 L 13 13 L 13 0" />
					<path fill="black" d="M 3 3 l 3 0 l 0 1 l -2 0 l 0 2 l -1 0 M 7 3 l 3 0 l 0 3 l -1 0 l 0 -2 l -2 0 M 3 7 l 1 0 l 0 2 l 2 0 l 0 1 l -3 0 M 9 7 l 1 0 l 0 3 l -3 0 l 0 -1 l 2 0" />
				</svg> <svg id="onufull" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 13 13">
					<path fill="grey" d="M 0 0 L 0 13 L 13 13 L 13 0" />
					<path fill="black" d="M 7 7 l 3 0 l 0 1 l -2 0 l 0 2 l -1 0 M 3 7 l 3 0 l 0 3 l -1 0 l 0 -2 l -2 0 M 7 3 l 1 0 l 0 2 l 2 0 l 0 1 l -3 0 M 5 3 l 1 0 l 0 3 l -3 0 l 0 -1 l 2 0" />
				</svg></div>
		</div>
		<script>
			const fontSize = window.innerWidth < 768 ? 12 : 18;
			const term = new Terminal({
				fontSize,
				cursorBlink: true,
				fontFamily: "Consolas, Courier, monospace",
				theme: {
					background: "#4E0E3B",
					foreground: "#FFFFFF",
					cursor: "#EEEEEC",
					selection: "#FFFFFF",
					black: "#2E3436",
					red: "#CC0000",
					green: "#4E9A06",
					yellow: "#C4A000",
					blue: "#3465A4",
					magenta: "#75507B",
					cyan: "#06989A",
					white: "#D3D7CF",
					brightBlack: "#555753",
					brightRed: "#EF2929",
					brightGreen: "#8AE234",
					brightYellow: "#FCE94F",
					brightBlue: "#729FCF",
					brightMagenta: "#AD7FA8",
					brightCyan: "#34E2E2",
					brightWhite: "#EEEEEC"
				}
			});
			const terminal = document.getElementById("terminal");
			term.open(terminal);
			term.focus();
			document.getElementById("full").addEventListener("click", () => {
				if (document.fullscreenElement) {
					document.exitFullscreen()
				} else {
					terminal.requestFullscreen()
				}
			});
			window.addEventListener("keydown", e => {
				if (e.repeat) {
					return
				}
				if (e.code === "F11" || (e.ctrlKey && e.code === "KeyR" || e.code === "F5") || e.ctrlKey && e.code === "KeyC" || e.ctrlKey && e.code === "KeyV") {
					e.stopPropagation()
				}
			}, true);
			window.addEventListener("keyup", e => {
				if (e.code === "F11" || (e.ctrlKey && e.code === "KeyR" || e.code === "F5") || e.ctrlKey && e.code === "KeyC" || e.ctrlKey && e.code === "KeyV") {
					e.stopPropagation()
				}
			}, true);

			function tryFocusTerminal(e) {
				const ignored = ["INPUT", "TEXTAREA", "SELECT", "BUTTON"];
				if (ignored.includes(e.target.tagName)) {
					return
				}
				if (document.activeElement !== term.textarea) {
					setTimeout(() => term.focus(), 0)
				}
			}
			document.addEventListener("click", tryFocusTerminal, true);
			term.textarea.addEventListener("blur", () => {
				if (document.activeElement !== term.textarea) {
					term.focus()
				}
			}, true);
			const fitAddon = new window.FitAddon.FitAddon;
			term.loadAddon(fitAddon);
			fitAddon.fit();
			window.addEventListener("resize", () => {
				fitAddon.fit()
			});
			terminal.addEventListener("contextmenu", e => {
				e.preventDefault()
			}, true);

			function getData() {
				let data = {};
				try {
					data = JSON.parse(window.localStorage.getItem("fishing-local-data") || "")
				} catch {}
				return data
			}

			function setData(data) {
				window.localStorage.setItem("fishing-local-data", JSON.stringify(data))
			}

			function loadGame(username, password) {
				const data = getData();
				setData(data);
				if (data[username]) {
					return {
						code: 1,
						data: data[username]
					}
				} else {
					return {
						code: 0
					}
				}
			}

			function saveGame(username, password, gameData) {
				const data = getData();
				data[username] = gameData;
				setData(data);
				return {
					code: 1
				}
			}

			function hasSave(username) {
				const data = getData();
				setData(data);
				return {
					code: data[username] ? 1 : 2
				}
			}
			let langs = {
				setLanguage: () => {}
			};
			let disposers = [];
			import("./main.js").then(async fishing => {
				while (true) {
					const gameInstance = fishing.createGameInstance(text => term.write(text), loadGame, saveGame, hasSave);
					langs = gameInstance.languages;
					gameInstance.setConsoleSize({
						cols: term.cols,
						rows: term.rows
					});
					disposers.push(term.onData(data => {
						gameInstance.onInput(data)
					}));
					disposers.push(term.onResize(size => gameInstance.setConsoleSize(size)));
					await gameInstance.launch();
					disposers.forEach(disposer => disposer.dispose());
					disposers.length = 0
				}
			}).catch(e => {
				disposers.forEach(disposer => disposer.dispose());
				disposers.length = 0;
				term.write(`\n\n\x1b[m${e.stack}\n`.replace(/\n/g, "\r\n"));
				console.error(e);
				console.error(e.stack)
			});

		</script>
	</body>

</html>
